name: Control plane

on:
  push:
  pull_request:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: control-plane-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  advisory-structural:
    name: Advisory candidate doctor (untrusted code)
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false
          lfs: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Validate candidate snapshot with candidate code (advisory only)
        env:
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python roadmap/tools/doctor.py --snapshot "$HEAD_SHA" --check-live-leases

  advisory-runtime-selftest:
    name: Advisory candidate selftest (untrusted code)
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false
          lfs: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Exercise candidate runtime in disposable repositories (advisory only)
        run: python roadmap/tools/selftest.py

  advisory-scope-review:
    name: Advisory candidate scope review (untrusted code)
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false
          lfs: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Review pull request with candidate policy (advisory only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: >-
          python roadmap/tools/scope_diff.py "$BASE_SHA" "$HEAD_SHA"
          --branch "$HEAD_BRANCH" --check-live-lease
      - name: Replay pushed commits with candidate policy (advisory only)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: >-
          python roadmap/tools/scope_diff.py "$BASE_SHA" "$HEAD_SHA" --check-live-lease
      - name: Review explicit initial-history bootstrap (advisory only)
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        env:
          HEAD_SHA: ${{ github.sha }}
        run: >-
          python roadmap/tools/scope_diff.py
          0000000000000000000000000000000000000000 "$HEAD_SHA"
          --allow-initial --check-live-lease

  trusted-pr-audit:
    name: Trusted audit candidate (wire through a hosting ruleset required workflow)
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.base.ref ==
      (vars.CONTROL_PLANE_TARGET_BRANCH || github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout immutable server-owned policy source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ vars.CONTROL_PLANE_TRUST_REF || github.event.repository.default_branch }}
          path: trusted-policy
          fetch-depth: 0
          persist-credentials: false
          submodules: false
          lfs: false
      - name: Checkout simulated merge as inert candidate data
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          path: candidate-data
          fetch-depth: 0
          persist-credentials: false
          submodules: false
          lfs: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Import and verify candidate objects without executing candidate files
        id: candidate
        working-directory: trusted-policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MERGE_SHA=$(git -C ../candidate-data rev-parse HEAD)
          git fetch --no-tags ../candidate-data "$MERGE_SHA"
          test "$(git rev-parse "$BASE_SHA^{commit}")" = "$BASE_SHA"
          test "$(git rev-parse "$HEAD_SHA^{commit}")" = "$HEAD_SHA"
          test "$(git rev-parse "$MERGE_SHA^{commit}")" = "$MERGE_SHA"
          test "$(git rev-list --parents -n 1 "$MERGE_SHA")" = "$MERGE_SHA $BASE_SHA $HEAD_SHA"
          test "$(git rev-parse "$MERGE_SHA^{tree}")" = "$(git rev-parse "$HEAD_SHA^{tree}")"
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
      - name: Exercise immutable trusted runtime
        working-directory: trusted-policy
        run: python roadmap/tools/selftest.py
      - name: Inspect candidate head and simulated merge with trusted doctor
        working-directory: trusted-policy
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_SHA: ${{ steps.candidate.outputs.merge_sha }}
        run: |
          python roadmap/tools/doctor.py --snapshot "$HEAD_SHA" --check-live-leases
          python roadmap/tools/doctor.py --snapshot "$MERGE_SHA" --check-live-leases
      - name: Replay candidate commits with trusted parent-authority policy
        working-directory: trusted-policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          POLICY_APPROVAL: ${{ vars.CONTROL_PLANE_POLICY_APPROVAL }}
        run: >-
          python roadmap/tools/scope_diff.py "$BASE_SHA" "$HEAD_SHA"
          --branch "$HEAD_BRANCH" --check-live-lease
          --pull-request-number "$PR_NUMBER" --policy-approval "$POLICY_APPROVAL"
