name: Control plane

on:
  push:
  pull_request:

jobs:
  control-plane:
    name: Control plane doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate control plane (roadmap/)
        run: python roadmap/tools/doctor.py
      - name: Gate mutation selftest (doctor + scope gate + fingerprints)
        run: python roadmap/tools/selftest.py
